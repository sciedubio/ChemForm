    <script type="text/babel">
        // ==========================================
        // 0. 전역 유틸리티 (아래첨자 포맷팅 등)

        const formatFormula = (str) => {
            if (!str) return "";
            const subs = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
            return str.replace(/\d/g, m => subs[m]);
        };

        class AudioManager {
            constructor() { this.ctx = null; }
            init() { 
                if(!this.ctx) { const AC = window.AudioContext || window.webkitAudioContext; if(AC) this.ctx = new AC(); }
            }
            playTone(freq, type, duration, vol=0.1) {
                if(!this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(); osc.stop(this.ctx.currentTime + duration);
                } catch(e){}
            }
            success() { this.init(); this.playTone(600, 'sine', 0.1); setTimeout(()=>this.playTone(800, 'sine', 0.15), 100); this.vibrate(50); }
            error() { this.init(); this.playTone(300, 'sawtooth', 0.2); this.vibrate([50,50,50]); }
            unlock() { this.init(); this.playTone(500, 'square', 0.1); setTimeout(()=>this.playTone(1000, 'square', 0.2), 100); this.vibrate([100,50,100]); }
            click() { this.init(); this.playTone(800, 'sine', 0.05, 0.05); }
            combo(level) { this.init(); this.playTone(400 + (level*50), 'triangle', 0.1); }
            vibrate(pattern) { if(navigator.vibrate) { try { navigator.vibrate(pattern); }catch(e){} } }
        }
        const audio = new AudioManager();

            { title: "과산화수소 (수소 2, 산소 2)", slots: [{ type: 'element', expected: "H" }, { type: 'number', expected: "2" }, { type: 'element', expected: "O" }, { type: 'number', expected: "2" }] },

        // 타임어택: 교육적 오답(매력적인 함정)이 포함된 4지선다 풀
        const TIME_ATTACK_POOL = [

            { name: "과산화수소", formula: "H2O2", distractors: ["H2O", "HO2", "H2O3", "O2"] },
            { name: "염화 나트륨", formula: "NaCl", distractors: ["Na2Cl", "NaCl2", "NaC", "NCl"] },

            { name: "산화 알루미늄", formula: "Al2O3", distractors: ["Al3O2", "AlO3", "Al2O", "AlO"] },

        // ==========================================
        // 2. LocalStorage Wrapper
        // ==========================================
        const Storage = {
            save: (key, data) => localStorage.setItem(`chem_${key}`, JSON.stringify(data)),
            load: (key, defaultData) => { const item = localStorage.getItem(`chem_${key}`); return item ? JSON.parse(item) : defaultData; }
        };

        // ==========================================
        // 3. Canvas Engines (Vanilla JS)
        // ==========================================
        
        class MoleculeVisualizer {
            constructor(canvas) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d');
                this.width = canvas.width; this.height = canvas.height;
                this.atoms = []; this.bonds = []; this.angleX = 0; this.angleY = 0;
                this.isAnimating = false; this.animationFrame = null;
                this.isDragging = false; this.prevMouse = { x: 0, y: 0 };
                this.setupEvents();
            }
            resize(w, h) { 
                const dpr = window.devicePixelRatio || 1;
                this.width = w; this.height = h; 
                this.canvas.width = w * dpr; 
                this.canvas.height = h * dpr; 
                this.ctx.scale(dpr, dpr);
            }
            setupEvents() {
                const start = (e) => { 
                    if(e.cancelable) e.preventDefault();
                    this.isDragging = true; 
                    this.prevMouse = { x: e.touches ? e.touches[0].clientX : e.clientX, y: e.touches ? e.touches[0].clientY : e.clientY }; 
                };
                const drag = (e) => {
                    if (!this.isDragging) return;
                    if(e.cancelable) e.preventDefault();
                    const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY;
                    this.angleY += (cx - this.prevMouse.x) * 0.01; this.angleX += (cy - this.prevMouse.y) * 0.01;
                    this.prevMouse = { x: cx, y: cy };
                };
                const end = (e) => { this.isDragging = false; };
                
                this.canvas.addEventListener('mousedown', start); this.canvas.addEventListener('mousemove', drag); window.addEventListener('mouseup', end);
                this.canvas.addEventListener('touchstart', start, {passive: false}); this.canvas.addEventListener('touchmove', drag, {passive: false}); window.addEventListener('touchend', end);
                this._e = {start, drag, end};
            }
            setMolecule(type) {
                this.atoms = []; this.bonds = []; const scale = Math.min(this.width, this.height) * 0.15;
                const AP = { 
                    'C': ['#4b5563', 1.2, 'C'], 'O': ['#ef4444', 1.1, 'O'], 'H': ['#f8fafc', 0.8, 'H'], 'N': ['#3b82f6', 1.1, 'N'],
                    'Na': ['#8b5cf6', 1.5, 'Na'], 'Mg': ['#10b981', 1.4, 'Mg'], 'Al': ['#94a3b8', 1.3, 'Al'], 'Si': ['#fbbf24', 1.4, 'Si'],
                    'S':  ['#eab308', 1.2, 'S'], 'Cl': ['#22c55e', 1.2, 'Cl'], 'Cu': ['#d97706', 1.4, 'Cu'], 'K':  ['#a855f7', 1.6, 'K'], 'Mn': ['#ec4899', 1.4, 'Mn']
                };
                const a = (x, y, z, e) => { this.atoms.push({ ox: x*scale, oy: y*scale, oz: z*scale, x:0, y:0, z:0, c: AP[e][0], r: AP[e][1]*scale*0.3, s: AP[e][2] }); return this.atoms.length - 1; };
                const b = (i, j, t=1) => { this.bonds.push({ i, j, t }); };

                if (type === 'H2O') { const o = a(0,0,0,'O'); b(o, a(0.8,0.6,0,'H')); b(o, a(-0.8,0.6,0,'H')); } 
                else if (type === 'CO2') { const c = a(0,0,0,'C'); b(c, a(1.2,0,0,'O'), 2); b(c, a(-1.2,0,0,'O'), 2); } 
                else if (type === 'CH4') { const c = a(0,0,0,'C'); b(c, a(1,1,1,'H')); b(c, a(-1,-1,1,'H')); b(c, a(-1,1,-1,'H')); b(c, a(1,-1,-1,'H')); } 
                else if (type === 'NH3') { const n = a(0,0,0,'N'); b(n, a(0,1,0.8,'H')); b(n, a(-0.8,1,-0.5,'H')); b(n, a(0.8,1,-0.5,'H')); }
                else if (type === 'O2') { const o1 = a(0.6,0,0,'O'); b(o1, a(-0.6,0,0,'O'), 2); }
                else if (type === 'N2') { const n1 = a(0.6,0,0,'N'); b(n1, a(-0.6,0,0,'N'), 3); }
                else if (type === 'H2O2') { const o1=a(-0.5,0,0,'O'); const o2=a(0.5,0,0,'O'); const h1=a(-1,0.6,0,'H'); const h2=a(1,-0.6,0,'H'); b(o1,o2); b(o1,h1); b(o2,h2); }
                else if (type === 'NaCl' || type === 'HCl' || type === 'KCl') { const e = type.replace('Cl',''); const a1 = a(-0.6,0,0,e); const a2 = a(0.6,0,0,'Cl'); b(a1, a2); }
                else if (type === 'MgO' || type === 'CuO' || type === 'CO') { const e = type.replace('O',''); const a1 = a(-0.6,0,0,e); const a2 = a(0.6,0,0,'O'); b(a1, a2, (type==='CO'?3:2)); }
                else if (type === 'SO2') { const s = a(0,0,0,'S'); b(s, a(-0.8,-0.6,0,'O'), 2); b(s, a(0.8,-0.6,0,'O'), 2); }
                else if (type === 'H2S') { const s = a(0,0,0,'S'); b(s, a(-0.8,0.6,0,'H')); b(s, a(0.8,0.6,0,'H')); }
                else if (type === 'Al2O3') { const o1=a(-1.2,0,0,'O'); const al1=a(-0.6,0.5,0,'Al'); const o2=a(0,0,0,'O'); const al2=a(0.6,-0.5,0,'Al'); const o3=a(1.2,0,0,'O'); b(o1,al1,2); b(al1,o2); b(o2,al2); b(al2,o3,2); }
                else if (type === 'CuSO4') { const s=a(0,0,0,'S'); const o1=a(0.8,0.8,0.8,'O'); const o2=a(-0.8,-0.8,0.8,'O'); const o3=a(-0.8,0.8,-0.8,'O'); const o4=a(0.8,-0.8,-0.8,'O'); const cu=a(-1.6,1.6,-1.6,'Cu'); b(s,o1,2); b(s,o2,2); b(s,o3); b(s,o4); b(cu,o3); b(cu,o4); }
                else if (type === 'KMnO4') { const mn=a(0,0,0,'Mn'); const o1=a(0.8,0.8,0.8,'O'); const o2=a(-0.8,-0.8,0.8,'O'); const o3=a(-0.8,0.8,-0.8,'O'); const o4=a(0.8,-0.8,-0.8,'O'); const k=a(-1.6,1.6,-1.6,'K'); b(mn,o1,2); b(mn,o2,2); b(mn,o3,2); b(mn,o4); b(k,o4); }
                
                this.angleX = Math.random() * Math.PI; this.angleY = Math.random() * Math.PI;
            }
            start() { if (!this.isAnimating) { this.isAnimating = true; this.animate(); } }
            stop() {
                this.isAnimating = false; if (this.animationFrame) cancelAnimationFrame(this.animationFrame);
                if (this._e) {
                    this.canvas.removeEventListener('mousedown', this._e.start); this.canvas.removeEventListener('mousemove', this._e.drag); window.removeEventListener('mouseup', this._e.end);
                    this.canvas.removeEventListener('touchstart', this._e.start); this.canvas.removeEventListener('touchmove', this._e.drag); window.removeEventListener('touchend', this._e.end);
                }
            }
            animate() {
                if (!this.isAnimating) return;
                if (!this.isDragging) { this.angleY += 0.01; this.angleX += 0.005; }
                this.render(); this.animationFrame = requestAnimationFrame(() => this.animate());
            }
            render() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                const cx = this.width/2; const cy = this.height/2; const cX = Math.cos(this.angleX); const sX = Math.sin(this.angleX); const cY = Math.cos(this.angleY); const sY = Math.sin(this.angleY);

                this.atoms.forEach(at => {
                    let x1 = at.ox * cY - at.oz * sY; let z1 = at.oz * cY + at.ox * sY;
                    let y2 = at.oy * cX - z1 * sX; let z2 = z1 * cX + at.oy * sX;
                    at.x = x1; at.y = y2; at.z = z2;

                    this.currentSlots.forEach(s => { s.x = cX; s.y = this.layout.slotBaseY + (s.type === 'number' ? eH - nH : 0); cX += s.width + sGap; });
                }
            }
            setupEvents() {
                const onDown = (e) => {
                    if (e.target !== this.canvas) return; 
                    if(e.cancelable) e.preventDefault(); 
                    const pos = this.getPos(e);
                    const isTouch = e.touches && e.touches.length > 0;
                    const pad = 15;
                    
                    if (pos.x >= this.btnSubmit.x - pad && pos.x <= this.btnSubmit.x+this.btnSubmit.w + pad && pos.y >= this.btnSubmit.y - pad && pos.y <= this.btnSubmit.y+this.btnSubmit.h + pad) { 
                        this.synthesize(); return; 
                    }
                    for (let i = this.cards.length - 1; i >= 0; i--) {
                        let c = this.cards[i];
                        if (c.isPointInside(pos.x, pos.y)) { 
                            audio.click(); this.draggingCard = c; c.isDragging = true; 
                            let offsetOffsetY = isTouch ? 40 : 0;
                            this.dragOffset = {x: pos.x - c.x, y: pos.y - c.y + offsetOffsetY}; 
                            this.currentSlots.forEach(s => { if(s.placedCard === c) s.placedCard = null; }); 
                            this.cards.splice(i, 1); this.cards.push(c); break; 
                        }
                    }
                };
                const onMove = (e) => { 
                    if(!this.draggingCard) return; 
                    if(e.cancelable) e.preventDefault(); 
                    const p = this.getPos(e); 
                    this.draggingCard.x = p.x - this.dragOffset.x; 
                    this.draggingCard.y = p.y - this.dragOffset.y; 
                };
                const onUp = (e) => {
                    if(!this.draggingCard) return; 
                    if(e.cancelable) e.preventDefault(); 
                    this.draggingCard.isDragging = false; 
                    let drop = false; const cx = this.draggingCard.x + this.draggingCard.width/2; const cy = this.draggingCard.y + this.draggingCard.height/2;
                    for (let s of this.currentSlots) { if (!s.placedCard && s.type === this.draggingCard.type && s.isPointInside(cx, cy)) { s.placedCard = this.draggingCard; drop = true; break; } }
                    if (!drop) this.draggingCard.resetPosition(); this.draggingCard = null;
                };
                this.canvas.addEventListener('mousedown', onDown); this.canvas.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
                this.canvas.addEventListener('touchstart', onDown, {passive: false}); this.canvas.addEventListener('touchmove', onMove, {passive: false}); window.addEventListener('touchend', onUp);
                this._e = {onDown, onMove, onUp, handleResize: this._e.handleResize};
            }
            synthesize() {
                let formulaStr = ""; this.currentSlots.forEach(s => { if(s.placedCard) { if(s.type === 'number' && s.placedCard.text === '1') return; formulaStr += s.placedCard.text; } });
                if(formulaStr === "") { audio.error(); this.setAlert({ isOpen: true, msg: "카드를 슬롯에 배치해 주세요."}); return; }
                
                const SUPPORTED_3D = ['H2O', 'CO2', 'CH4', 'NH3', 'O2', 'N2', 'Al2O3', 'NaCl', 'MgO', 'HCl', 'CuO', 'SO2', 'H2S', 'CO', 'H2O2', 'CuSO4', 'KMnO4', 'KCl'];
                const VALID_NO_3D = ['MgCl2', 'AlCl3', 'Na2O', 'K2O', 'MnO2', 'CCl4', 'SiCl4', 'CS2', 'SO3', 'CuCl2', 'Na2S', 'MgS', 'Al2S3', 'H2', 'Cl2', 'SiH4', 'NaOH', 'KOH', 'H2SO4', 'HNO3', 'KNO3'];
                const CONTINUOUS_SOLIDS = ['C', 'Cu', 'Na', 'Mg', 'Al', 'Si', 'S', 'K', 'Mn'];
                const MONATOMIC_GASES = ['He'];

                if (SUPPORTED_3D.includes(formulaStr)) { 
                    audio.success(); this.open3DModal(formulaStr); 
                } 
                else if (VALID_NO_3D.includes(formulaStr)) { 
                    audio.success(); this.setAlert({ isOpen: true, msg: `[ ${formatFormula(formulaStr)} ]\n자연계에 존재하는 올바른 화학식입니다! 🎉\n\n(아쉽게도 이 분자의 3D 모형은 아직 연구소에 등록되지 않았습니다.)` }); 
                } 
                else if (CONTINUOUS_SOLIDS.includes(formulaStr)) {
                    audio.success(); this.setAlert({ isOpen: true, msg: `[ ${formatFormula(formulaStr)} ]\n자연계에 존재하는 올바른 화학식입니다! 🎉\n\n💡 구리(Cu)같은 금속이나 탄소(C)로 이루어진 다이아몬드처럼, 수많은 원자가 연속적으로 배열되어 결합한 물질은 분자 단위로 나눌 수 없어 '원소 기호' 자체를 화학식으로 사용합니다.` });
                }
                else if (MONATOMIC_GASES.includes(formulaStr)) {
                    audio.success(); this.setAlert({ isOpen: true, msg: `[ ${formatFormula(formulaStr)} ]\n자연계에 존재하는 올바른 화학식입니다! 🎉\n\n💡 헬륨(He)과 같은 18족 비활성 기체는 이미 안정하여 다른 원소와 결합하지 않고, 원자 1개가 독립적으로 성질을 띠는 '단원자 분자'로 존재합니다.` });
                }
                else if (formulaStr.includes('He') && formulaStr !== 'He') { 
                    audio.error(); this.setAlert({ isOpen: true, msg: `[ ${formatFormula(formulaStr)} ]\n불가능한 조합입니다.\n\n💡 이유: He(헬륨)은 '비활성 기체'로 이미 매우 안정하여 다른 원소와 결합하지 않습니다.` }); 
                } 
                else if (['H','N','O','Cl'].includes(formulaStr)) { 
                    audio.error(); this.setAlert({ isOpen: true, msg: `[ ${formatFormula(formulaStr)} ]\n단독으로는 존재하기 어렵습니다.\n\n💡 이유: 수소(H), 질소(N), 산소(O), 염소(Cl) 등은 혼자서는 불안정하여 원자 2개가 결합한 분자 상태(예: O₂, H₂ 등)로 존재합니다.`}); 
                } 
                else { 
                    audio.click(); this.setAlert({ isOpen: true, msg: `[ ${formatFormula(formulaStr)} ]\n연구소 데이터베이스에 없는 조합입니다.\n\n화학 결합 규칙에 어긋나는 물질일 수도 있고, 실제로 존재하지만 아직 DB에 등록되지 않은 물질일 수도 있습니다.\n\n이 물질이 진짜 존재하는지 인터넷에 직접 검색해 보는 요원이 되어 볼까요? 🧐` }); 
                }
            }
            renderLoop() {
                if (!this.isAnimating) return;
                this.ctx.fillStyle = '#12121c'; this.ctx.fillRect(0, 0, this.CW, this.CH);
                this.ctx.fillStyle = '#b537f2'; this.ctx.font = 'bold 16px "Noto Sans KR"'; this.ctx.textAlign = 'left'; this.ctx.textBaseline = 'top'; this.ctx.fillText("🔬 자유 연구실 (샌드박스)", 15, 15);
                this.ctx.fillStyle = '#fff'; this.ctx.font = `bold ${this.isMobile?16:20}px "Noto Sans KR"`; this.ctx.textAlign = 'center'; this.ctx.fillText("원하는 분자를 자유롭게 합성해 보세요", this.CW/2, this.layout.titleY);
                this.ctx.fillStyle = 'rgba(181,55,242,0.02)'; this.ctx.fillRect(this.layout.boxX, this.layout.boxY, this.layout.boxW, this.layout.boxH);
                this.ctx.strokeStyle = 'rgba(181,55,242,0.3)'; this.ctx.lineWidth=2; this.ctx.strokeRect(this.layout.boxX, this.layout.boxY, this.layout.boxW, this.layout.boxH);
                this.currentSlots.forEach(s => s.draw(this.ctx));
                this.ctx.beginPath(); this.ctx.moveTo(this.layout.boxX, this.layout.lineY); this.ctx.lineTo(this.CW-this.layout.boxX, this.layout.lineY); this.ctx.strokeStyle='#334155'; this.ctx.stroke();
                this.ctx.fillStyle = '#94a3b8'; this.ctx.font = `bold ${this.isMobile?14:16}px "Noto Sans KR"`; this.ctx.textAlign = 'center'; this.ctx.fillText("기호와 숫자 카드로 화학식을 완성하세요", this.CW/2, this.layout.guideY);
                this.cards.forEach(c => { if (!this.currentSlots.some(s => s.placedCard===c) || c.isDragging) c.draw(this.ctx); });
                this.ctx.fillStyle = 'rgba(181,55,242,0.1)'; this.ctx.beginPath(); this.ctx.roundRect(this.btnSubmit.x, this.btnSubmit.y, this.btnSubmit.w, this.btnSubmit.h, 8); this.ctx.fill();
                this.ctx.strokeStyle = '#b537f2'; this.ctx.lineWidth = 2; this.ctx.stroke();
                this.ctx.fillStyle = '#b537f2'; this.ctx.font = 'bold 18px "Noto Sans KR"'; this.ctx.textAlign='center'; this.ctx.textBaseline='middle'; this.ctx.fillText("합성 (Synthesize)", this.btnSubmit.x+this.btnSubmit.w/2, this.btnSubmit.y+this.btnSubmit.h/2);
                this.animationFrame = requestAnimationFrame(() => this.renderLoop());

function doGet(e) {

}`;

        );

        const EscapeSimulationView = ({ onFinish, stats, setStats }) => {
            const [levelIdx, setLevelIdx] = useState(Storage.load('e_level', 0));
            const [inputValue, setInputValue] = useState("");
            const [isWrong, setIsWrong] = useState(false); const [isSolved, setIsSolved] = useState(false); const [showHint, setShowHint] = useState(false);
            const [elapsedTime, setElapsedTime] = useState(Storage.load('e_time', 0));
            
            const canvasRef = useRef(null); const rendererRef = useRef(null); const timerRef = useRef(null);
            const currentLevel = ESCAPE_ROOM_LEVELS[levelIdx];

            useEffect(() => { timerRef.current = setInterval(() => { setElapsedTime(p => { const nt = p + 1; Storage.save('e_time', nt); return nt; }); }, 1000); return () => clearInterval(timerRef.current); }, []);

            useEffect(() => {
                if (canvasRef.current && !rendererRef.current) {
                    rendererRef.current = new MoleculeVisualizer(canvasRef.current);
                    const handleResize = () => { if(canvasRef.current && canvasRef.current.parentElement) rendererRef.current.resize(canvasRef.current.parentElement.clientWidth, canvasRef.current.parentElement.clientHeight); };
                    window.addEventListener('resize', handleResize); handleResize(); rendererRef.current.start();
                    return () => { window.removeEventListener('resize', handleResize); rendererRef.current.stop(); };
                }
            }, []);

            useEffect(() => { setInputValue(""); setShowHint(false); if (rendererRef.current && !isSolved) { rendererRef.current.atoms = []; rendererRef.current.bonds = []; } }, [levelIdx, isSolved]);

            const handleSubmit = (e) => {
                e.preventDefault(); if(!inputValue.trim() || isSolved) return;
                const norm = (str) => str.replace(/\s+/g, '').toLowerCase();
                if (currentLevel.answer.some(ans => norm(ans) === norm(inputValue))) {
                    audio.success(); setIsSolved(true); if (rendererRef.current) rendererRef.current.setMolecule(currentLevel.moleculeType);
                } else { audio.error(); setIsWrong(true); setTimeout(() => setIsWrong(false), 500); }
            };

            const handleNextLevel = () => {
                audio.click();
                if (levelIdx < ESCAPE_ROOM_LEVELS.length - 1) { 
                    setLevelIdx(p => { const nl = p + 1; Storage.save('e_level', nl); return nl; }); setIsSolved(false); 
                } else { 
                    clearInterval(timerRef.current); setStats(p => ({ ...p, escapeTime: elapsedTime })); onFinish(); 
                }
            }

            return (
                <div className="absolute inset-0 flex flex-col md:flex-row bg-dark-900">
                    <div className="md:w-1/3 p-6 flex flex-col justify-between z-10 glass-panel md:rounded-none md:border-y-0 md:border-l-0 border-r border-gray-800">
                        <div>
                            <div className="text-xl font-mono text-cyan-400 font-bold mb-8">TIMER <span className="text-white ml-2">{Math.floor(elapsedTime/60).toString().padStart(2,'0')}:{(elapsedTime%60).toString().padStart(2,'0')}</span></div>
                            <div className={`inline-flex px-3 py-1 rounded-full border ${currentLevel.borderColor} ${currentLevel.color} bg-opacity-10 mb-4 text-sm font-bold`}>LEVEL 0{currentLevel.id}</div>
                            <h2 className="text-lg md:text-xl font-bold leading-relaxed mb-6">{currentLevel.question}</h2>
                        </div>
                        <div className={`transition-opacity ${isSolved ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input type="text" value={inputValue} onChange={e => setInputValue(e.target.value)} placeholder="정답 입력" className={`w-full bg-dark-900 border-2 border-gray-700 focus:border-cyan-500 rounded-xl px-4 py-3 text-lg font-mono text-center text-white outline-none ${isWrong ? 'animate-shake' : ''}`} disabled={isSolved}/>
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => {audio.click(); setShowHint(true)}} className="px-4 py-3 bg-gray-800 text-gray-300 rounded-xl w-1/3 font-bold">힌트</button>
                                    <button type="submit" className={`px-4 py-3 rounded-xl font-bold w-2/3 transition-all ${inputValue.trim() ? 'bg-cyan-600 text-white active:scale-95' : 'bg-gray-800 text-gray-500'}`}>해독 시도</button>
                                </div>
                                {showHint && <div className="p-3 bg-yellow-500/10 text-yellow-300 text-sm text-center rounded-lg border border-yellow-500/30">💡 {currentLevel.hint}</div>}
                            </form>
                        </div>
                    </div>
                    <div className="flex-1 relative bg-black flex items-center justify-center overflow-hidden min-h-[50vh]">
                        <div className="absolute inset-0 z-20 w-full h-full cursor-move"><canvas ref={canvasRef} className="w-full h-full block"></canvas></div>
                        {isSolved && (
                            <div className="absolute inset-0 z-30 flex flex-col items-center justify-between py-10 pointer-events-none">
                                <div className="flex flex-col items-center px-4 text-center">
                                    <div className={`text-3xl md:text-5xl font-black mb-4 ${currentLevel.color} drop-shadow-[0_0_20px_currentColor]`}>ACCESS GRANTED</div>
                                    <div className="text-gray-300 text-sm md:text-base font-bold bg-black/60 backdrop-blur-sm px-6 py-3 rounded-xl border border-gray-700">
                                        화면을 드래그하여 분자의 구조를 관찰하세요
                                    </div>
                                </div>
                                <button onClick={handleNextLevel} className="pointer-events-auto mt-4 mx-4 px-8 py-4 bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-bold rounded-2xl text-lg md:text-xl shadow-[0_0_20px_rgba(0,243,255,0.4)] transition-transform active:scale-95">
                                    {levelIdx < ESCAPE_ROOM_LEVELS.length - 1 ? '다음 구역으로 이동 ➔' : '방탈출 성공! 보고서 쓰기 ➔'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const EscapeReportView = ({ onSubmit, escapeTime, setGlobalAlert }) => {
            const [form, setForm] = useState({ studentId: '', studentName: '', insight: '' });
            const [quizzes, setQuizzes] = useState([]); const [answers, setAnswers] = useState([null, null, null]); const [showResults, setShowResults] = useState(false);
            
            useEffect(() => { setQuizzes([...QUIZ_POOL].sort(() => 0.5 - Math.random()).slice(0, 3)); }, []);
            const handleAnswer = (idx, val) => { if(!showResults) { audio.click(); const newAns = [...answers]; newAns[idx] = val; setAnswers(newAns); } };

            const handleSubmit = () => {
                if (!form.studentId.trim() || !form.studentName.trim() || !form.insight.trim()) { audio.error(); return setGlobalAlert({ isOpen: true, msg: "모든 항목을 입력해주세요." }); }
                if (answers.includes(null)) { audio.error(); return setGlobalAlert({ isOpen: true, msg: "퀴즈를 모두 풀어주세요." }); }
                if (!showResults) { audio.success(); setShowResults(true); } else { audio.click(); onSubmit({ ...form, quizScore: Math.round(answers.reduce((acc, ans, idx) => acc + (ans === quizzes[idx].a ? 1 : 0), 0) * 33.3) }); }
            };

            return (
                <div className="absolute inset-0 w-full h-full overflow-y-auto bg-dark-900">
                    <div className="min-h-full flex flex-col items-center p-4 py-8 pb-32">
                        <div className="w-full max-w-3xl glass-panel rounded-3xl overflow-hidden shadow-2xl shrink-0">
                            <div className="bg-blue-900/50 p-6 text-center border-b border-blue-500/30">
                                <h2 className="text-xl md:text-2xl font-black text-white mb-2">탈출 성공! 소요 시간: {Math.floor(escapeTime/60)}분 {escapeTime%60}초</h2>
                            </div>
                            <div className="p-4 md:p-8 space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <input type="text" placeholder="학번" className="bg-dark-900 border border-gray-700 rounded-xl p-4 focus:border-cyan-500 outline-none text-lg" value={form.studentId} onChange={e => setForm({...form, studentId: e.target.value})} disabled={showResults} />
                                    <input type="text" placeholder="이름" className="bg-dark-900 border border-gray-700 rounded-xl p-4 focus:border-cyan-500 outline-none text-lg" value={form.studentName} onChange={e => setForm({...form, studentName: e.target.value})} disabled={showResults} />
                                </div>
                                <div className="space-y-4">
                                    <h3 className="font-bold text-neon-green text-lg">OX 퀴즈</h3>
                                    {quizzes.map((q, i) => (
                                        <div key={i} className={`p-5 rounded-2xl border ${showResults ? (answers[i] === q.a ? 'border-green-500/50 bg-green-900/20' : 'border-red-500/50 bg-red-900/20') : 'border-gray-700 bg-dark-800'}`}>
                                            <p className="mb-4 text-base md:text-lg leading-relaxed">{formatFormula(q.q)}</p>
                                            <div className="flex gap-3">
                                                <button onClick={() => handleAnswer(i, true)} className={`flex-1 py-3 rounded-xl font-bold border-2 transition-colors ${answers[i] === true ? 'bg-blue-600 border-blue-400 text-white' : 'bg-dark-900 border-gray-600 text-gray-400'}`} disabled={showResults}>O</button>
                                                <button onClick={() => handleAnswer(i, false)} className={`flex-1 py-3 rounded-xl font-bold border-2 transition-colors ${answers[i] === false ? 'bg-red-600 border-red-400 text-white' : 'bg-dark-900 border-gray-600 text-gray-400'}`} disabled={showResults}>X</button>
                                            </div>
                                            {showResults && <div className="mt-4 p-3 bg-black/40 rounded-lg text-sm md:text-base text-gray-300 border border-gray-700">{formatFormula(q.explain)}</div>}
                                        </div>
                                    ))}
                                </div>
                                <textarea placeholder="오늘 연구소를 탈출하며 알게 된 점을 적어주세요." className="w-full bg-dark-900 border border-gray-700 rounded-xl p-4 h-32 resize-none focus:border-cyan-500 outline-none text-lg" value={form.insight} onChange={e => setForm({...form, insight: e.target.value})} disabled={showResults}></textarea>
                                <button onClick={handleSubmit} className="w-full py-5 bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-bold rounded-xl text-xl shadow-[0_0_15px_rgba(0,243,255,0.4)] active:scale-95 transition-transform">{showResults ? '서버로 최종 제출 ➔' : '채점 결과 확인하기'}</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const EscapeDoneView = ({ onRestart }) => (
            <div className="absolute inset-0 flex flex-col items-center justify-center p-6 text-center bg-dark-900">
                <div className="glass-panel p-8 md:p-10 rounded-3xl max-w-md w-full border-t-4 border-t-neon-blue">
                    <h2 className="text-2xl md:text-3xl font-black text-white mb-4 text-glow-blue">보고서 제출 완료!</h2>
                    <p className="text-gray-300 mb-8">지구 환경을 위한 데이터가 서버에 기록되었습니다.</p>
                    <button onClick={()=>{audio.click(); onRestart();}} className="w-full py-4 bg-dark-800 hover:bg-dark-700 text-white font-bold rounded-xl">처음으로</button>
                </div>
            </div>
        );

        const EscapeRoomFlow = ({ setGlobalAlert }) => {
            const [view, setView] = useState('intro'); const [stats, setStats] = useState({ escapeTime: 0 });
            const submitData = async (formData) => {
                if (!GOOGLE_SCRIPT_URL) return setGlobalAlert({ isOpen: true, msg: "DB 연동 오류! GOOGLE_SCRIPT_URL을 설정하세요." });
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({...formData, escapeTime: stats.escapeTime, timestamp: new Date().toLocaleString(), type: 'escape' }) });
                    Storage.save('e_level', 0); Storage.save('e_time', 0); setView('done');
                } catch (error) { setGlobalAlert({ isOpen: true, msg: "네트워크 오류 발생" }); }
            };
            return (
                <div className="flex-1 w-full h-full relative">
                    {view === 'intro' && <EscapeIntroView onStart={() => setView('simulation')} />}
                    {view === 'simulation' && <EscapeSimulationView onFinish={() => setView('report')} stats={stats} setStats={setStats} />}
                    {view === 'report' && <EscapeReportView onSubmit={submitData} escapeTime={stats.escapeTime} setGlobalAlert={setGlobalAlert} />}
                    {view === 'done' && <EscapeDoneView onRestart={() => setView('intro')} />}
                </div>
            );
        };

        // --- 3.5 신규 타임어택 엔진 (탭4) ---
        const TimeAttackIntroView = ({ onStart, onViewLeaderboard }) => (
            <div className="absolute inset-0 flex flex-col items-center justify-center p-6 bg-dark-900 overflow-y-auto">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,140,0,0.05)_0,transparent_50%)] pointer-events-none"></div>
                <div className="glass-panel p-8 md:p-12 rounded-3xl text-center max-w-lg w-full z-10 border-t-4 border-t-neon-orange my-auto shrink-0">
                    <h1 className="text-3xl md:text-5xl font-black mb-4 text-glow-orange tracking-tight">코어 안정화<br/>타임어택</h1>
                    <p className="text-gray-300 mb-8 leading-relaxed font-medium text-sm md:text-base">
                        제한시간 60초! 등장하는 물질의 정확한 화학식을 선택하세요.<br/>
                        <span className="text-neon-red font-bold">⚠️ 오답 시: 콤보 초기화, 50점 감점, 0.5초 조작 정지</span><br/>
                        빠르고 신중한 판단으로 명예의 전당에 이름을 올리세요!
                    </p>
                    <button onClick={()=>{audio.click(); onStart();}} className="w-full py-4 px-6 bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-500 text-white font-bold rounded-xl text-xl shadow-[0_0_20px_rgba(255,140,0,0.4)] active:scale-95 mb-4">도전 시작하기</button>
                    <button onClick={()=>{audio.click(); onViewLeaderboard();}} className="w-full py-4 px-6 bg-dark-800 border border-gray-600 hover:bg-dark-700 text-gray-300 font-bold rounded-xl text-lg transition-colors active:scale-95">🏆 명예의 전당 확인</button>
                </div>
            </div>
        );

        const TimeAttackGameView = ({ onFinish }) => {
            const [timeLeft, setTimeLeft] = useState(60);
            const [score, setScore] = useState(0);
            const [combo, setCombo] = useState(0);
            const [maxCombo, setMaxCombo] = useState(0);
            
            const [currentQ, setCurrentQ] = useState(null);
            const [choices, setChoices] = useState([]);
            const [isShake, setIsShake] = useState(false);
            const [isSuccess, setIsSuccess] = useState(false);
            
            // 광클 방지 및 페널티용 상태 추가
            const [isBlocked, setIsBlocked] = useState(false);
            const [penaltyMsg, setPenaltyMsg] = useState("");

            useEffect(() => { getNewQ(null); }, []);

            useEffect(() => {
                if(timeLeft <= 0) { audio.error(); onFinish(score, maxCombo); return; }
                const timer = setInterval(()=>setTimeLeft(p=>p-1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft]);

            const getNewQ = (prevName) => {
                let q;
                do { q = TIME_ATTACK_POOL[Math.floor(Math.random() * TIME_ATTACK_POOL.length)]; } while(q && prevName && q.name === prevName);
                
                const shuffledDistractors = [...q.distractors].sort(() => 0.5 - Math.random()).slice(0, 3);
                const newChoices = [q.formula, ...shuffledDistractors].sort(() => 0.5 - Math.random());
                
                setCurrentQ(q); setChoices(newChoices);
            };

            const handleChoice = (selectedFormula) => {
                if(!currentQ || isShake || isSuccess) return; // 연속 터치(찍기) 완벽 차단
                
                if(selectedFormula === currentQ.formula) {
                    const newCombo = combo + 1; setCombo(newCombo);
                    if(newCombo > maxCombo) setMaxCombo(newCombo);
                    const multiplier = 1 + Math.floor(newCombo / 5) * 0.5; 
                    setScore(p => p + Math.floor(100 * multiplier));
                    
                    audio.combo(Math.min(newCombo, 10)); 
                    setIsSuccess(true); setTimeout(()=>setIsSuccess(false), 300);
                    getNewQ(currentQ.name);
                } else {
                    audio.error(); 
                    setCombo(0);
                    setScore(p => Math.max(0, p - 50)); // 오답 시 50점 차감
                    setIsShake(true); setTimeout(()=>setIsShake(false), 500); // 0.5초 조작 정지
                }
            };

            return (
                <div className="absolute inset-0 flex flex-col bg-[#12121c] p-4 md:p-8 overflow-hidden">
                    <div className="flex justify-between items-center bg-dark-800 p-4 rounded-2xl border border-gray-700 mb-6 shrink-0 relative">
                        {/* 페널티 발생 시 뜨는 경고 텍스트 */}
                        {penaltyMsg && <div className="absolute -bottom-8 left-4 text-neon-red font-black text-xl md:text-2xl animate-bounce text-glow-red">{penaltyMsg}</div>}
                        
                        <div className={`text-2xl md:text-4xl font-bold font-mono ${timeLeft <= 10 ? 'text-red-500 animate-pulse' : 'text-neon-orange'}`}>
                            {Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,'0')}
                        </div>
                        <div className="text-right">
                            <div className="text-xl md:text-3xl font-black text-neon-blue">{score.toLocaleString()} PTS</div>
                            <div className={`text-sm md:text-base font-bold transition-colors ${combo > 0 ? 'text-neon-green' : 'text-gray-500'}`}>{combo} COMBO</div>
                        </div>
                    </div>

                    <div className={`flex-1 flex flex-col justify-center items-center ${isShake ? 'animate-shake' : ''}`}>
                        <div className="text-neon-orange font-bold mb-4 tracking-widest text-sm md:text-base">TARGET MOLECULE</div>
                        <div className={`text-4xl md:text-6xl font-black mb-12 text-white transition-all ${isSuccess ? 'scale-110 text-neon-green text-glow-green' : ''}`}>
                            {currentQ?.name}
                        </div>
                        
                        <div className="w-full max-w-lg mx-auto grid grid-cols-2 gap-4 pb-8 px-2 relative">
                            {/* 마비 상태일 때 버튼 덮는 시각적 에러 오버레이 */}
                            {isBlocked && isShake && (
                                <div className="absolute inset-0 z-10 flex items-center justify-center pointer-events-none">
                                    <span className="text-neon-red font-black text-xl md:text-2xl bg-black/80 px-6 py-3 rounded-full border border-neon-red backdrop-blur-sm tracking-widest">
                                        SYSTEM ERROR...
                                    </span>
                                </div>
                            )}
                            {choices.map((choice, i) => (
                                <button
                                    key={i}
                                    onClick={() => handleChoice(choice)}
                                    disabled={isBlocked}
                                    className={`py-8 md:py-10 border-2 text-white font-sans text-3xl md:text-4xl font-bold rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.3)] transition-all flex items-center justify-center tracking-wider ${isBlocked && isShake ? 'bg-dark-900 border-red-900 opacity-50 cursor-not-allowed' : 'bg-dark-800 border-gray-600 hover:border-neon-orange hover:bg-dark-700 active:scale-95'}`}
                                >
                                    {formatFormula(choice)}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const TimeAttackSubmitView = ({ score, maxCombo, onSubmit, setGlobalAlert }) => {
            const [form, setForm] = useState({ studentId: '', studentName: '' });
            const handleSubmit = () => {
                if (!form.studentId.trim() || !form.studentName.trim()) { audio.error(); return setGlobalAlert({ isOpen: true, msg: "학번과 이름을 입력해주세요." }); }
                audio.success();
                onSubmit({ ...form, score, maxCombo });
            };
            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center p-6 bg-dark-900">
                    <div className="glass-panel p-8 rounded-3xl w-full max-w-md text-center border-t-4 border-t-neon-orange">
                        <h2 className="text-3xl font-black text-white mb-2">TIME OVER</h2>
                        <div className="text-5xl font-black text-neon-orange text-glow-orange my-6">{score.toLocaleString()}</div>
                        <div className="text-gray-400 mb-8 font-mono">MAX COMBO: {maxCombo}</div>
                        
                        <div className="space-y-4 mb-8">
                            <input type="text" placeholder="학번" className="w-full bg-dark-900 border border-gray-700 rounded-xl p-4 focus:border-neon-orange outline-none text-center text-lg" value={form.studentId} onChange={e => setForm({...form, studentId: e.target.value})} />
                            <input type="text" placeholder="이름" className="w-full bg-dark-900 border border-gray-700 rounded-xl p-4 focus:border-neon-orange outline-none text-center text-lg" value={form.studentName} onChange={e => setForm({...form, studentName: e.target.value})} />
                        </div>
                        <button onClick={handleSubmit} className="w-full py-5 bg-gradient-to-r from-orange-600 to-red-600 text-white font-black rounded-xl text-xl active:scale-95 shadow-[0_0_15px_rgba(255,140,0,0.4)]">랭킹에 등록하기</button>
                    </div>
                </div>
            );
        };

        const TimeAttackLeaderboardView = ({ onRestart, setGlobalAlert }) => {
            const [ranks, setRanks] = useState([]); const [loading, setLoading] = useState(true);

            useEffect(() => {
                if(!GOOGLE_SCRIPT_URL) { setLoading(false); return; }
                fetch(GOOGLE_SCRIPT_URL)
                    .then(res => res.json())
                    .then(data => { setRanks(data); setLoading(false); })
                    .catch(err => { setLoading(false); });
            }, []);

            return (
                <div className="absolute inset-0 flex flex-col p-4 md:p-8 bg-dark-900 overflow-y-auto">
                    <div className="w-full max-w-lg mx-auto glass-panel rounded-3xl p-6 md:p-8 border-t-4 border-t-neon-yellow shrink-0 mb-8">
                        <h2 className="text-3xl font-black text-white mb-6 text-center text-glow-yellow">🏆 명예의 전당</h2>
                        {loading ? (
                            <div className="flex flex-col items-center py-20 text-neon-yellow"><div className="w-12 h-12 border-4 border-gray-700 border-t-neon-yellow rounded-full animate-spin mb-4"></div><div>랭킹 데이터를 불러오는 중...</div></div>
                        ) : ranks.length === 0 ? (
                            <div className="text-center py-20 text-gray-500">아직 등록된 랭킹이 없습니다.<br/>첫 번째 기록을 세워보세요!</div>
                        ) : (
                            <div className="space-y-3 mb-8">
                                {ranks.map((r, i) => (
                                    <div key={i} className={`flex items-center justify-between p-4 rounded-xl border ${i===0 ? 'bg-yellow-500/20 border-yellow-500/50 shadow-[0_0_10px_rgba(234,179,8,0.2)]' : i===1 ? 'bg-gray-300/20 border-gray-300/50' : i===2 ? 'bg-orange-600/20 border-orange-600/50' : 'bg-dark-800 border-gray-700'}`}>
                                        <div className="flex items-center gap-4">
                                            <div className={`font-black text-2xl w-6 text-center ${i===0?'text-yellow-400':i===1?'text-gray-300':i===2?'text-orange-500':'text-gray-500'}`}>{i+1}</div>
                                            <div>
                                                <div className="font-bold text-white text-lg">{r.studentName} <span className="text-sm text-gray-500 font-normal ml-2">{r.studentId}</span></div>
                                                <div className="text-sm text-gray-400 font-mono mt-1">Max {r.maxCombo} Combo</div>
                                            </div>
                                        </div>
                                        <div className="font-black font-mono text-2xl text-neon-blue">{r.score.toLocaleString()}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                        <button onClick={()=>{audio.click(); onRestart();}} className="w-full py-5 bg-dark-800 border border-gray-600 hover:bg-dark-700 text-white font-bold rounded-xl active:scale-95 text-lg">메인으로 돌아가기</button>
                    </div>
                </div>
            );
        };

        const TimeAttackFlow = ({ setGlobalAlert }) => {
            const [view, setView] = useState('intro'); const [gameResult, setGameResult] = useState({score:0, maxCombo:0});
            const submitData = async (formData) => {
                if (!GOOGLE_SCRIPT_URL) { setView('leaderboard'); return setGlobalAlert({ isOpen: true, msg: "DB URL이 설정되지 않아 랭킹을 불러올 수 없습니다."}); }
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({...formData, timestamp: new Date().toLocaleString(), type: 'timeattack' }) });
                    setView('leaderboard');
                } catch (error) { setGlobalAlert({ isOpen: true, msg: "네트워크 오류 발생" }); setView('leaderboard'); }
            };

            return (
                <div className="flex-1 w-full h-full relative overflow-hidden">
                    {view === 'intro' && <TimeAttackIntroView onStart={() => setView('game')} onViewLeaderboard={() => setView('leaderboard')} />}
                    {view === 'game' && <TimeAttackGameView onFinish={(s, mc) => { setGameResult({score:s, maxCombo:mc}); setView('submit'); }} />}
                    {view === 'submit' && <TimeAttackSubmitView score={gameResult.score} maxCombo={gameResult.maxCombo} onSubmit={submitData} setGlobalAlert={setGlobalAlert} />}
                    {view === 'leaderboard' && <TimeAttackLeaderboardView onRestart={()=>setView('intro')} setGlobalAlert={setGlobalAlert} />}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('formula'); 
            const [unlockedTabs, setUnlockedTabs] = useState(Storage.load('unlocked', { escape: false, sandbox: false, timeattack: false }));
            const [alertData, setAlertData] = useState({ isOpen: false, msg: "" });
            const [isGuideOpen, setIsGuideOpen] = useState(false);
            const [pinModal, setPinModal] = useState({ isOpen: false, target: null, code: "" });

            const handleTabClick = (tab) => {
                if(tab === activeTab) return; audio.click();
                if (tab === 'escape' && !unlockedTabs.escape) setPinModal({ isOpen: true, target: 'escape', code: '0070' });
                else if (tab === 'sandbox' && !unlockedTabs.sandbox) setPinModal({ isOpen: true, target: 'sandbox', code: '0303' });
                else if (tab === 'timeattack' && !unlockedTabs.timeattack) setPinModal({ isOpen: true, target: 'timeattack', code: '4444' });
                else setActiveTab(tab);
            };

            const handlePinSuccess = (targetTab) => {
                const newUnlocked = { ...unlockedTabs, [targetTab]: true };
                setUnlockedTabs(newUnlocked); Storage.save('unlocked', newUnlocked);
                setPinModal({ isOpen: false, target: null, code: "" }); setActiveTab(targetTab);
            };

            return (
                <div className="h-screen flex flex-col font-sans relative overflow-hidden bg-dark-900">
                    <CustomAlert isOpen={alertData.isOpen} message={alertData.msg} onClose={() => setAlertData({isOpen: false, msg: ""})} />
                    <AdminGuideModal isOpen={isGuideOpen} onClose={() => setIsGuideOpen(false)} />
                    <PinPadModal isOpen={pinModal.isOpen} targetTab={pinModal.target} correctPin={pinModal.code} onSuccess={handlePinSuccess} onClose={()=>setPinModal({isOpen:false, target:null, code:""})} />
                    
                    <header className="z-50 bg-dark-900 border-b border-gray-800 flex justify-between items-center px-2 md:px-6 h-14 shrink-0 overflow-x-auto whitespace-nowrap">
                        <div className="flex gap-2 md:gap-4 font-bold text-sm md:text-base h-full">
                            <button onClick={() => handleTabClick('formula')} className={`py-2 px-3 transition-colors border-b-2 h-full flex items-center gap-1 ${activeTab === 'formula' ? 'text-neon-blue border-neon-blue drop-shadow-[0_0_8px_rgba(0,243,255,0.5)]' : 'text-gray-500 border-transparent hover:text-gray-300'}`}>
                                🧪 화학식 조립기
                            </button>
                            <button onClick={() => handleTabClick('escape')} className={`py-2 px-3 transition-colors border-b-2 h-full flex items-center gap-1 ${activeTab === 'escape' ? 'text-neon-green border-neon-green drop-shadow-[0_0_8px_rgba(57,255,20,0.5)]' : 'text-gray-500 border-transparent hover:text-gray-300'}`}>
                                {unlockedTabs.escape ? '🔓' : '🔒'} 비밀 연구소
                            </button>
                            <button onClick={() => handleTabClick('sandbox')} className={`py-2 px-3 transition-colors border-b-2 h-full flex items-center gap-1 ${activeTab === 'sandbox' ? 'text-neon-purple border-neon-purple drop-shadow-[0_0_8px_rgba(181,55,242,0.5)]' : 'text-gray-500 border-transparent hover:text-gray-300'}`}>
                                {unlockedTabs.sandbox ? '🔬' : '🔒'} 자유 샌드박스
                            </button>
                            <button onClick={() => handleTabClick('timeattack')} className={`py-2 px-3 transition-colors border-b-2 h-full flex items-center gap-1 ${activeTab === 'timeattack' ? 'text-neon-orange border-neon-orange drop-shadow-[0_0_8px_rgba(255,140,0,0.5)]' : 'text-gray-500 border-transparent hover:text-gray-300'}`}>
                                {unlockedTabs.timeattack ? '⏱️' : '🔒'} 타임어택
                            </button>
                        </div>
                        <button onClick={() => {audio.click(); setIsGuideOpen(true);}} className="text-gray-400 hover:text-white text-xl p-2 rounded-full hover:bg-gray-800 transition-colors ml-2 shrink-0">⚙️</button>
                    </header>

                    <main className="flex-1 flex flex-col relative w-full h-full overflow-hidden">
                        {activeTab === 'formula' && <FormulaGameView setGlobalAlert={setAlertData} />}
                        {activeTab === 'escape' && <EscapeRoomFlow setGlobalAlert={setAlertData} />}
                        {activeTab === 'sandbox' && <SandboxView setGlobalAlert={setAlertData} />}
                        {activeTab === 'timeattack' && <TimeAttackFlow setGlobalAlert={setAlertData} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
